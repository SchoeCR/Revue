# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Pack
      run: dotnet pack --configuration Release -p:PackageVersion=1.0.${{ github.run_number }}
    - name: Login to GitHub Packages
      run: dotnet nuget add source --username SchoeCR --password ${{ secrets.MY_GITHUB_PAT }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/NAMESPACE/index.json"
    - name: Push package
      run: dotnet nuget push "bin/Release/Revue.1.0.${{ github.run_number }}.nupkg" --api-key ${{ secrets.MY_GITHUB_PAT }} --source "github"
